<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Pricing</title>

    <style>
        body {
            font-family: 'Segoe UI';
            background: #0f172a;
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 40px;
        }

        input, select {
            padding: 10px;
            margin: 8px;
            width: 220px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 12px 25px;
            background: #22c55e;
            color: black;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .card {
            margin-top: 25px;
            padding: 20px;
            background: #1e293b;
            border-radius: 12px;
            display: inline-block;
        }

        .price {
            font-size: 28px;
            font-weight: bold;
            color: #22c55e;
        }

        .shap {
            margin-top: 15px;
            text-align: left;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🚀 Dynamic Pricing Engine</h1>

    <form action="/predict" method="post">

        <input name="room_size" placeholder="Room Size" required><br>
        <input name="furnishing" placeholder="Furnishing (1-3)" required><br>
        <input name="AC" placeholder="AC (0/1)" required><br>
        <input name="availability" placeholder="Availability (0-365)" required><br>
        <input name="reviews" placeholder="Number of Reviews" required><br>
        <input name="rpm" placeholder="Reviews per Month" required><br>

        <select name="location">
            <option>Manhattan</option>
            <option>Brooklyn</option>
            <option>Other</option>
        </select><br>

        <button type="submit">Predict Price</button>

    </form>

    {% if prediction_text %}
    <div class="card">
        <div class="price">Predicted Price: {{ prediction_text }}</div>
        <div>{{ surge_text }}</div>

        <div class="shap">
            <h3>🔍 Key Drivers:</h3>
            <ul>
                {% for item in shap_results %}
                <li>{{ item }}</li>
                {% endfor %}
            </ul>
        </div>
    </div>
    {% endif %}
</div>

</body>
</html>
